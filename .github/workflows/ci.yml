name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      E2E_ENABLED: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore StrataConfig.sln

      - name: Build
        run: dotnet build StrataConfig.sln -c Release --no-restore

      - name: Install Playwright browsers (E2E only)
        if: env.E2E_ENABLED == 'true'
        shell: pwsh
        run: |
          $script = Get-ChildItem -Recurse -Filter playwright.ps1 -Path StrataConfig.Tests/bin/Release | Select-Object -First 1
          if ($null -ne $script) {
            Write-Host "Installing browsers via $($script.FullName)"
            & $script.FullName install --with-deps
          } else {
            Write-Host "Playwright install script not found; skipping browser install."
          }

      - name: Test (unit only; skip E2E)
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
        run: dotnet test StrataConfig.Tests -c Release --no-build --logger "trx;LogFileName=test_results.trx" --filter "FullyQualifiedName!~StrataConfig.Tests.E2E"

      - name: Test (E2E only)
        if: env.E2E_ENABLED == 'true'
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
        run: dotnet test StrataConfig.Tests -c Release --no-build --logger "trx;LogFileName=test_results_e2e.trx" --filter "FullyQualifiedName~StrataConfig.Tests.E2E"
